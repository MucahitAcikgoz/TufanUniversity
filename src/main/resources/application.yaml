spring:
  application:
    name: TufanUniversity
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/university
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

logging:
  level:
      org.flywaydb: debug
      org.springframework.boot.autoconfigure.flyway: debug
      org.hibernate.SQL: debug
      org.springframework.boot.autoconfigure.jdbc: debug
      org.springframework.jdbc.datasource: debug